name: test

# Runs the unit test net on every push to main, so a change that breaks a
# scoring / comp / billing / permissions / pipeline core fails here instead of
# reaching a customer. Additive and fast — pure-logic tests, no DB.
# (We ship straight to main — no PRs — so the net must run on push.)
#
# Node 22 matches the local dev toolchain; the unified `npm test` glob
# (src/**/*.test.ts) relies on the test-runner glob support added in Node 21+.

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
