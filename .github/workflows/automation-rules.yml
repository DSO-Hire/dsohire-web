name: Automation rules (time triggers)

# N13 Phase 3 — fires time-based automation triggers (idle_in_stage). Vercel
# Hobby rejects any vercel.json cron that runs more than once per day (the
# deployment fails outright), so — same as interview-reminders + job-lifecycle
# — we run this from GitHub Actions and ping the existing Vercel route hourly.
#
# Setup: reuses the existing CRON_SECRET repo secret (Settings → Secrets and
# variables → Actions); it must match the CRON_SECRET env var in Vercel.

on:
  schedule:
    # Top of every hour. GH Actions cron uses UTC.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit the automation-rules cron route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          response=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dsohire.com/api/cron/automation-rules")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron route returned $status"
            exit 1
          fi
