name: Automation sequences (drip sender)

# N16 v2 — sends due drip-sequence steps hourly. Same rationale as the other
# crons: Vercel Hobby rejects sub-daily vercel.json crons, so GitHub Actions
# pings the Vercel route. Reuses the existing CRON_SECRET repo secret (must
# match the CRON_SECRET env var in Vercel).

on:
  schedule:
    # Top of every hour. GH Actions cron uses UTC.
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit the automation-sequences cron route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          response=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dsohire.com/api/cron/automation-sequences")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron route returned $status"
            exit 1
          fi
