name: Job lifecycle

# E1.18 scheduled publish + auto-expire. Vercel Hobby tier rejects any
# vercel.json cron that runs more than once per day (the deployment fails
# outright), so — same as interview-reminders — we run this from GitHub
# Actions and have it ping the existing Vercel route on an hourly cadence.
#
# Setup: the CRON_SECRET repo secret (Settings → Secrets and variables →
# Actions) is already configured for interview-reminders and is reused
# here; it must match the CRON_SECRET env var in Vercel.

on:
  schedule:
    # Top of every hour. GH Actions cron uses UTC.
    - cron: '0 * * * *'
  # Allow manual triggering from the Actions tab for debugging.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit the job-lifecycle cron route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          response=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dsohire.com/api/cron/job-lifecycle")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron route returned $status"
            exit 1
          fi
