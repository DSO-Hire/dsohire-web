name: Interview reminders

# Vercel Hobby tier caps cron jobs at once per 24h. The interview
# reminder cron needs every-30-min granularity (24h + 1h pre-interview
# emails). GitHub Actions runs free at any cadence ≥5 min, so we let
# GH ping the existing Vercel route on a schedule instead.
#
# Setup: GitHub repo Settings → Secrets and variables → Actions →
# add a new secret named CRON_SECRET with the same value Vercel uses
# (the existing CRON_SECRET env var in Vercel).

on:
  schedule:
    # Every 30 minutes. GH Actions cron uses UTC.
    - cron: '*/30 * * * *'
  # Allow manual triggering from the Actions tab for debugging.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit the interview-reminders cron route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          response=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dsohire.com/api/cron/interview-reminders")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron route returned $status"
            exit 1
          fi
