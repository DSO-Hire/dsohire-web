name: PracticeFit weekly digest

# B.2 weekly PracticeFit drip. Runs from GitHub Actions (not vercel.json) because
# the Vercel Hobby tier caps the number of cron entries and we're already at the
# limit — same pattern as interview-reminders / job-lifecycle / automation-*.
#
# Cadence: Mondays at 13:00 UTC. During US daylight saving (our launch window)
# that's 9:00am ET / 8:00am CT, per Cam's spec. GitHub cron is fixed UTC and does
# not observe DST, so in winter this lands an hour earlier (8am ET / 7am CT); flip
# to '0 14 * * 1' if we ever want to pin 9am ET year-round.
#
# Setup: reuses the existing CRON_SECRET repo secret (Settings → Secrets and
# variables → Actions); it must match the CRON_SECRET env var in Vercel.

on:
  schedule:
    - cron: '0 13 * * 1'
  # Allow manual triggering from the Actions tab for debugging.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit the practice-fit-digest cron route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          response=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dsohire.com/api/cron/practice-fit-digest")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron route returned $status"
            exit 1
          fi
